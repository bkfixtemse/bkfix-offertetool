<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>BKfix Offertetool</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Allround">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f4f6f8;color:#1a2332;line-height:1.5}
header{background:linear-gradient(135deg,#2c3e50 0%,#4a6278 100%);color:#fff;padding:20px 30px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
header h1{font-size:22px;font-weight:600;letter-spacing:.5px}
header .subtitle{font-size:13px;opacity:.85;margin-top:3px}
.layout{display:grid;grid-template-columns:1fr 400px;gap:20px;padding:20px;max-width:1600px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tabs{display:flex;gap:4px;border-bottom:2px solid #e4e8ec;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 18px;background:none;border:none;cursor:pointer;color:#64748b;font-size:14px;font-weight:500;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:#334155}
.tab.active{color:#2c3e50;border-bottom-color:#2c3e50;font-weight:600}
h2{font-size:18px;margin-bottom:14px;color:#2c3e50;font-weight:600}
h3{font-size:14px;margin:18px 0 8px;color:#475569;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#64748b;font-weight:500}
input,select{padding:9px 11px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;background:#fff;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:#2c3e50;box-shadow:0 0 0 3px rgba(44,62,80,.1)}
input[type=number]{font-variant-numeric:tabular-nums}
.error{color:#dc2626;font-size:12px;margin-top:3px;font-weight:500}
.error-box{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;padding:10px 14px;border-radius:6px;margin:10px 0;font-size:13px}
.warning-box{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;padding:10px 14px;border-radius:6px;margin:10px 0;font-size:13px}
.info-box{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af;padding:10px 14px;border-radius:6px;margin:10px 0;font-size:13px}
button{background:#2c3e50;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;transition:background .2s}
button:hover{background:#1a2532}
button:disabled{background:#94a3b8;cursor:not-allowed}
button.secondary{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
button.secondary:hover{background:#e2e8f0}
button.danger{background:#dc2626}
button.danger:hover{background:#991b1b}
.summary{position:sticky;top:20px}
.price-line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.price-line span:first-child{color:#64748b}
.price-line span:last-child{font-variant-numeric:tabular-nums;font-weight:500}
.price-total{display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid #e2e8f0;margin-top:10px;font-size:16px;font-weight:700;color:#2c3e50}
.offer-list{margin-top:14px}
.offer-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.offer-item .info{flex:1}
.offer-item .title{font-weight:600;color:#1a2332}
.offer-item .desc{color:#64748b;font-size:12px;margin-top:2px}
.offer-item .price{font-weight:600;margin-right:10px}
.btn-group{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tag{display:inline-block;background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;margin-right:4px}
.tag.success{background:#d1fae5;color:#065f46}
.tag.warn{background:#fef3c7;color:#92400e}
.tag.error{background:#fee2e2;color:#991b1b}
details{margin-top:12px}
details summary{cursor:pointer;padding:8px;background:#f1f5f9;border-radius:6px;font-size:13px;font-weight:500;color:#475569}
details[open] summary{margin-bottom:8px}
.hidden{display:none!important}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.summary{position:static}}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-card{background:#f8fafc;padding:12px;border-radius:6px;border-left:3px solid #2c3e50}
.kpi-card .label{font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.kpi-card .value{font-size:18px;font-weight:700;color:#2c3e50;margin-top:2px;font-variant-numeric:tabular-nums}
.kpi-card.green{border-color:#059669}
.kpi-card.orange{border-color:#ea580c}
.grid-header{display:grid;grid-template-columns:2fr 80px 100px 100px 40px;gap:10px;padding:6px 12px;font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.customer-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tl-section{border-top:2px solid #e2e8f0;margin-top:14px;padding-top:14px}
.tl-deal-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #cbd5e1;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto}
.tl-deal-option{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9}
.tl-deal-option:hover{background:#f0f9ff}
.tl-deal-option:last-child{border-bottom:none}

/* Login overlay */
#login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1a2332 0%,#2c3e50 60%,#4a6278 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
#login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
#login-box .logo{text-align:center;margin-bottom:28px}
#login-box .logo h1{font-size:22px;font-weight:700;color:#2c3e50;margin-bottom:4px}
#login-box .logo p{font-size:13px;color:#64748b}
#login-box .field{margin-bottom:16px}
#login-box label{display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
#login-box input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;transition:border-color .2s}
#login-box input:focus{outline:none;border-color:#2c3e50;box-shadow:0 0 0 3px rgba(44,62,80,.1)}
#login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#2c3e50,#4a6278);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
#login-btn:hover{opacity:.9}
#login-btn:disabled{opacity:.6;cursor:not-allowed}
#login-error{color:#dc2626;font-size:13px;text-align:center;margin-top:12px;min-height:18px;font-weight:500}
</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <div class="logo">
      <h1>BKfix Offertetool</h1>
      <p>Aanmelden vereist</p>
    </div>
    <div class="field">
      <label>E-mailadres</label>
      <input type="email" id="login-email" placeholder="uw@gmail.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="login-btn" onclick="doLogin()">Aanmelden</button>
    <div id="login-error"></div>
  </div>
</div>

<header>
<h1>BKfix Offertetool</h1>
<div class="subtitle">Real-time berekening voor rolluiken, screens, knikarmscherm en veranda/pergola</div>
</header>

<div class="layout">
<div>
<div class="card">
<div class="tabs" id="tabs">
<button class="tab active" data-prod="rolluik">Rolluik</button>
<button class="tab" data-prod="screen">Screen</button>
<button class="tab" data-prod="knikarm">Knikarmscherm</button>
<button class="tab" data-prod="veranda">Veranda/Pergola</button>
</div>

<div id="form-container"></div>
</div>
</div>

<div>
<div class="card summary">
<h2>Huidige berekening</h2>
<div id="live-calc"></div>

<h2 style="margin-top:20px">Offerte</h2>
<div class="field" style="margin-bottom:12px">
<label>Klant</label>
<input type="text" id="klant-naam" placeholder="Naam klant">
</div>

<div id="offer-list" class="offer-list"></div>

<div id="totals-block"></div>

<!-- Werkuren sectie -->
<div style="border-top:2px solid #e2e8f0;margin-top:14px;padding-top:14px">
<h2 style="margin-bottom:10px">Werkuren plaatsing</h2>
<div class="row-3" style="margin-bottom:8px">
  <div class="field">
    <label>Uurtarief (€/uur)</label>
    <input type="number" id="w-tarief" value="230" min="0" step="1" oninput="renderOffer()">
  </div>
  <div class="field">
    <label>Uren</label>
    <input type="number" id="w-uren" value="0" min="0" step="0.5" oninput="renderOffer()">
  </div>
  <div class="field">
    <label>Personen</label>
    <input type="number" id="w-personen" value="2" min="1" step="1" oninput="renderOffer()">
  </div>
</div>
<div id="werkuren-block"></div>
</div>

<div class="btn-group" style="margin-top:14px">
<button class="secondary" onclick="clearOffer()">Offerte wissen</button>
</div>

<div class="tl-section">
<h2 style="margin-bottom:10px">Teamleader</h2>
<div id="tl-status"></div>

<div id="tl-config">
  <div class="row" style="margin-bottom:8px">
    <div class="field">
      <label>Client ID</label>
      <input type="text" id="tl-client-id" placeholder="01cc1c0e...">
    </div>
    <div class="field">
      <label>Client Secret</label>
      <input type="password" id="tl-client-secret" placeholder="1ecb60d2...">
    </div>
  </div>
  <details style="margin-top:0;margin-bottom:10px">
    <summary>Eenmalige instelling in Teamleader Marketplace</summary>
    <div style="font-size:12px;color:#64748b;padding:8px 0;line-height:1.7">
      Zet de <strong>Redirect URI</strong> op:<br>
      <code id="tl-redirect-hint" style="background:#f1f5f9;padding:2px 6px;border-radius:3px;font-size:11px;display:block;margin:4px 0;word-break:break-all"></code>
      Scopes: <strong>Quotations</strong> + <strong>Deals</strong>
    </div>
  </details>
  <button onclick="tlStartAuth()" style="width:100%;margin-bottom:10px">Verbinden met Teamleader</button>
</div>

<div id="tl-connected" class="hidden">
  <div style="position:relative;margin-bottom:10px">
    <div class="field">
      <label>Zoek deal in Teamleader</label>
      <input type="text" id="tl-deal-search" placeholder="Typ klantnaam of dealtitel…" autocomplete="off" oninput="tlOnDealSearchInput()">
    </div>
    <div id="tl-deal-dropdown" class="tl-deal-dropdown hidden"></div>
  </div>
  <div id="tl-selected-deal-info" style="font-size:12px;color:#059669;margin-bottom:10px;min-height:16px"></div>
  <div class="field" style="margin-bottom:12px">
    <label>BTW tarief</label>
    <select id="tl-tax-rate"><option value="">Laden…</option></select>
  </div>
  <div class="btn-group">
    <button id="tl-export-btn" onclick="tlExportQuotation(event)" style="background:#1a6b3c;flex:1">⬆ Exporteer naar Teamleader</button>
    <button class="secondary" onclick="tlDisconnect()">Afmelden</button>
  </div>
</div>
</div>

</div>
</div>
</div>

const ceil = (n,step) => Math.ceil(n/step)*step;

function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style')Object.assign(e.style,v);
    else if(k==='dataset')Object.assign(e.dataset,v);
    else if(k.startsWith('on'))e[k]=v;
    else if(k==='className')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}

function opt(val,label){const o=document.createElement('option');o.value=val;o.textContent=label;return o;}

const customOptionCounts = {};

function renderCustomOptionsSection(prefix){
  return `
  <h3>Vrije invoer</h3>
  <div id="${prefix}-custom-options"></div>
  <button class="secondary" type="button" onclick="addCustomOptionRow('${prefix}')" style="margin-top:8px">+ Vrije optie</button>
  `;
}

function addCustomOptionRow(prefix, description='', amount='0'){
  customOptionCounts[prefix] = (customOptionCounts[prefix] || 0) + 1;
  const id = customOptionCounts[prefix];
  const container = $(`${prefix}-custom-options`);
  if(!container)return;
  const row = el('div',{className:'row',id:`${prefix}-custom-row-${id}`},[
    el('div',{className:'field'},[
      el('label',{},'Omschrijving'),
      el('input',{type:'text',id:`${prefix}-custom-desc-${id}`,value:description,placeholder:'bv. afwijkende uitvoering',oninput:()=>recalcCurrentProduct()})
    ]),
    el('div',{className:'field'},[
      el('label',{},'Bedrag (€)'),
      el('div',{style:{display:'flex',gap:'6px'}},[
        el('input',{type:'number',id:`${prefix}-custom-amount-${id}`,value:amount,step:'0.01',oninput:()=>recalcCurrentProduct(),style:{flex:'1'}}),
        el('button',{className:'secondary',type:'button',onclick:()=>{row.remove();recalcCurrentProduct();},style:{padding:'4px 10px'}},'×')
      ])
    ])
  ]);
  container.appendChild(row);
}

function getCustomOptionRows(prefix){
  const rows = [];
  const max = customOptionCounts[prefix] || 0;
  for(let i=1;i<=max;i++){
    const descEl = $(`${prefix}-custom-desc-${i}`);
    const amountEl = $(`${prefix}-custom-amount-${i}`);
    if(!descEl || !amountEl) continue;
    const description = descEl.value.trim();
    const amount = parseFloat(amountEl.value);
    if(!description && !amount) continue;
    rows.push({description:description || 'Vrije optie', amount:isNaN(amount)?0:amount});
  }
  return rows;
}

function recalcCurrentProduct(){
  switch(state.currentProduct){
    case 'rolluik': calcRolluik(); break;
    case 'screen': calcScreen(); break;
    case 'knikarm': calcKnikarm(); break;
    case 'veranda': calcVeranda(); break;
  }
}

function calcRolluik(){
  const errors=[];
  const warnings=[];
  const type = $('r-type').value;
  const aantal = parseInt($('r-aantal').value)||1;
  const breedte = parseFloat($('r-breedte').value);
  const hoogte = parseFloat($('r-hoogte').value);
  const plaatsing = $('r-plaatsing').value;

  // Lookup type data
  const typeData = DATA.rolluik.prices[type];
  // Max dimensions from opties list F3:H (built-in in our data - use plaatsing_extra for max? Actually max in Excel is via 2-rolluik lijst F-H)
  // We hardcode max dims for each type
  const ROLLUIK_MAX = {
    'Ecoroll_L':{b:3500,h:2800},
    'Rollex_L':{b:3500,h:2800},
    'Ecoroll_M':{b:3200,h:2800},
    'Rollex_M':{b:3200,h:2800},
    'Ecoroll_L_Solar':{b:3500,h:2800}
  };
  const maxDim = ROLLUIK_MAX[type];

  if(!breedte || !hoogte){
    return showResult({product:'Rolluik',errors:['Vul breedte en hoogte in'],warnings:[],base:0,total:0});
  }

  if(maxDim){
    if(breedte > maxDim.b) errors.push(`Breedte ${breedte}mm overschrijdt maximum voor ${type} (${maxDim.b}mm)`);
    if(hoogte > maxDim.h) errors.push(`Hoogte ${hoogte}mm overschrijdt maximum voor ${type} (${maxDim.h}mm)`);
  }
  if(breedte < 1000) warnings.push(`Breedte ${breedte}mm is kleiner dan 1000mm - prijs niet bekend in tabel`);
  if(hoogte < 1000) warnings.push(`Hoogte ${hoogte}mm is kleiner dan 1000mm - prijs niet bekend in tabel`);

  // Bestelmaat
  const bestB = plaatsing==='odd' ? breedte+110 : breedte-6;
  const bestH = plaatsing==='odd' ? hoogte+110 : hoogte-4;
  const bCeil = ceil(bestB,100);
  const hCeil = ceil(bestH,100);

  // Lookup price
  const prefix = {'Ecoroll_L':'EL_','Rollex_L':'RL_','Ecoroll_M':'EM_','Rollex_M':'RM_','Ecoroll_L_Solar':'ELS_'}[type];
  const heightKey = `${prefix}H_${hCeil}`;
  const widthKey = `${prefix}B_${bCeil}`;
  let basePrice = null;
  if(typeData && typeData[heightKey]){
    basePrice = typeData[heightKey][widthKey];
  }
  if(basePrice === 'x' || basePrice === undefined || basePrice === null){
    if(errors.length===0) errors.push(`Combinatie ${bCeil}×${hCeil}mm niet produceerbaar voor ${type}`);
    basePrice = 0;
  }

  // Kast
  const kastPrice = DATA.rolluik.kast[type]?.[heightKey] || 0;

  // Geleider (uit 2-rolluik lijst A4:B22, type geleider)
  const geleider = $('r-geleider').value;
  const geleiderExtra = geleider ? (DATA.opties.rolluik_extras.geleiders[geleider] || 0) : 0;
  const geleiderPrice = geleiderExtra > 0 ? (bestH/1000)*2*geleiderExtra : 0;

  // Motor
  const motor = $('r-motor').value;
  const motorPrice = motor ? (DATA.opties.rolluik_extras.motoren[motor] || 0) : 0;

  // Afwijkende motorkabel
  const mkabel = $('r-mkabel').value;
  const mkabelPrice = mkabel ? (DATA.opties.rolluik_extras.afwijkende_motorkabel[mkabel] || 0) : 0;

  // Type kast (factor)
  const kasttype = $('r-kasttype').value;
  const kastTypeRaw = DATA.opties.rolluik_extras.kast_types[kasttype] || 0;
  const kastTypePrice = kastTypeRaw > 1 ? kastTypeRaw : kastTypeRaw * basePrice;

  // Koppelen
  const koppel = $('r-koppel').value;
  const koppelPrice = koppel ? (DATA.opties.rolluik_extras.koppelen[koppel] || 0) : 0;

  // Soort lamel (hardschuim)
  const lamel = $('r-lamel').value;
  const kleur = $('r-kleur').value;
  const kleurCustom = $('r-kleur-custom').value.trim();
  const kleurLabel = kleurCustom || kleur;
  let lamelPrice = 0;
  if(lamel === 'hardschuim'){
    const kleurData = kleur ? DATA.opties.rolluik_extras.lamel_colors[kleur] : null;
    if(kleurData && kleurData.hardschuim === 'ja'){
      lamelPrice = (bestB * bestH / 1000000) * 119;
    } else if(kleurData && kleurData.hardschuim === 'nee'){
      errors.push(`Hardschuim niet mogelijk met kleur "${kleur}"`);
    } else if(kleurCustom){
      warnings.push(`Controleer handmatig of hardschuim mogelijk is voor kleur "${kleurCustom}"`);
    }
  }

  // Bereikbaarheid (plaatsing)
  const bereik = $('r-bereik').value;
  const bereikVal = DATA.opties.algemene.bereikbaarheid[bereik];
  const bereikPrice = (typeof bereikVal === 'number') ? bereikVal : 0;
  if(typeof bereikVal === 'string' && bereikVal) warnings.push(`Bereikbaarheid "${bereik}": ${bereikVal}`);

  // Bediening
  const bed1 = $('r-bed1').value;
  const bed2 = $('r-bed2').value;
  const bed1Price = bed1 ? (DATA.opties.algemene.bediening[bed1] || 0) : 0;
  const bed2Price = bed2 ? (DATA.opties.algemene.bediening[bed2] || 0) : 0;
  const manualOptions = getCustomOptionRows('r');
  const manualOptionsPrice = manualOptions.reduce((sum,opt)=>sum+opt.amount,0);

  // Plaatsing per stuk: 50 + plaatsing_per_type lookup (we use type-specific from list I3:J8)
  const plaatsingPerType = DATA.opties.rolluik_extras.plaatsing_extra_per_type[type] || 100;
  const plaatsingPerStuk = 50 + plaatsingPerType;
  const plaatsingTotaal = plaatsingPerStuk * aantal + bereikPrice;

  // Subtotal rolluik (product)
  const productSubtotal = (basePrice + kastPrice + geleiderPrice + motorPrice + mkabelPrice + kastTypePrice + koppelPrice + lamelPrice) * aantal + manualOptionsPrice;
  const korting = parseFloat($('r-korting').value) || 0;

  const bedTotal = bed1Price + bed2Price;

  // Verkoop = productSubtotal + plaatsingTotaal + bediening
  const marge = parseFloat($('r-marge').value)/100 || 0.5;
  // In the Excel: F = D*(1-E) is aankoop = verkoop - marge%
  // then verkoop = aankoop/(1-0.2) (target 20% marge)
  // Simplified: the "verkoop prijs" from tabel IS the book-list-sale-price (D)
  // aankoop = D*(1-marge)
  // Our "basePrice" from tabel = adviesverkoopprijs
  const aankoop = productSubtotal * (1 - marge);
  const verkoop = aankoop / (1 - 0.2);  // 20% target margin
  const uwVerkoop = verkoop - korting + plaatsingTotaal + bedTotal;

  const item = {
    product:'Rolluik',
    type,aantal,breedte,hoogte,plaatsing,
    bestelmaat:`${bCeil}×${hCeil}`,
    options:[
      geleider && `Geleider: ${geleider}`,
      kasttype && `Kast: ${kasttype}`,
      motor && `Motor: ${motor}`,
      mkabel && `Afw. motorkabel: ${mkabel}`,
      lamel==='hardschuim' && `Lamel: hardschuim`,
      kleurLabel && `Kleur: ${kleurLabel}`,
      koppel && `Koppelen: ${koppel}`,
      bereik && `Bereikbaarheid: ${bereik}`,
      bed1 && `Bediening 1: ${bed1}`,
      bed2 && `Bediening 2: ${bed2}`,
      ...manualOptions.map(opt=>`${opt.description}: €${fmt(opt.amount)}`)
    ].filter(Boolean),
    opmerkingen: $('r-opm').value,
    basePrice,kastPrice,geleiderPrice,motorPrice,mkabelPrice,kastTypePrice,koppelPrice,lamelPrice,
    extrasPrice:manualOptionsPrice,
    productSubtotal,bereikPrice,bed1Price,bed2Price,plaatsingPerStuk,plaatsingTotaal,
    korting,marge,aankoop,verkoop,uwVerkoop,
    errors,warnings
  };
  state.currentItem = item;
  showResult(item);
}

function calcScreen(){
  const errors=[]; const warnings=[];
  const type = $('s-type').value;
  const aantal = parseInt($('s-aantal').value)||1;
  const breedte = parseFloat($('s-breedte').value);
  const hoogte = parseFloat($('s-hoogte').value);
  const plaatsing = $('s-plaatsing').value;

  const typeData = DATA.screens.prices[type];
  const maxDim = DATA.screens.max[type];  // [maxW, maxH]

  if(!breedte || !hoogte){
    return showResult({product:'Screen',errors:['Vul breedte en hoogte in'],warnings:[],base:0,total:0});
  }

  if(maxDim){
    const [mw, mh] = maxDim;
    if(breedte > mw) errors.push(`Breedte ${breedte}mm overschrijdt maximum voor ${type} (${mw}mm)`);
    if(hoogte > mh) errors.push(`Hoogte ${hoogte}mm overschrijdt maximum voor ${type} (${mh}mm)`);
  }

  // Bestelmaat
  // ODD: voeg toe volgens plaatsing_types[type] (hoogte_add_odd, breedte_add_odd)
  // IDD: -4
  const sizeAdd = DATA.opties.screen_extras.plaatsing_types[type] || {hoogte_add_odd:100,breedte_add_odd:80};
  const bestB = plaatsing==='odd' ? breedte+sizeAdd.breedte_add_odd : breedte-4;
  const bestH = plaatsing==='odd' ? hoogte+sizeAdd.hoogte_add_odd : hoogte-4;
  const bCeil = ceil(bestB,100);
  const hCeil = ceil(bestH,100);

  const prefix = DATA.screens.prefixes[type];
  const heightKey = `${prefix}_H_${hCeil}`;
  const widthKey = `${prefix}_B_${bCeil}`;
  let basePrice = null;
  if(typeData && typeData[heightKey]){
    basePrice = typeData[heightKey][widthKey];
  }
  if(basePrice === 'x' || basePrice === undefined || basePrice === null){
    if(errors.length===0) errors.push(`Combinatie ${bCeil}×${hCeil}mm niet produceerbaar voor ${type}`);
    basePrice = 0;
  }

  // Options
  const gel = $('s-geleider').value;
  const gelRaw = gel ? DATA.opties.screen_extras.geleiders[gel] : 0;
  // some have string value like '10€ per meter'
  const gelExtra = (typeof gelRaw==='number')?gelRaw:(gel==='klikprofiel 12mm'?10:0);

  const onderlatRaw = DATA.opties.screen_extras.hoge_verzwaarde_onderlat[$('s-onderlat').value] || 0;

  const motor = $('s-motor').value;

  const bereik = $('s-bereik').value;
  const bereikRaw = DATA.opties.screen_extras.bereikbaarheid[bereik];
  const bereikPrice = (typeof bereikRaw === 'number') ? bereikRaw : 0;
  if(typeof bereikRaw === 'string' && bereikRaw) warnings.push(`Bereikbaarheid "${bereik}": ${bereikRaw}`);

  const doek = $('s-doek').value;
  const doekRaw = DATA.opties.algemene.doekgroep[doek];
  const doekPrice = (typeof doekRaw === 'number') ? doekRaw : 0;

  const koppel = $('s-koppel').value;
  const koppelPrice = koppel ? (DATA.opties.screen_extras.koppelen[koppel] || 0) : 0;

  const bed1 = $('s-bed1').value;
  const bed2 = $('s-bed2').value;
  const bed1Price = bed1 ? (DATA.opties.algemene.bediening[bed1] || 0) : 0;
  const bed2Price = bed2 ? (DATA.opties.algemene.bediening[bed2] || 0) : 0;
  const manualOptions = getCustomOptionRows('s');
  const manualOptionsPrice = manualOptions.reduce((sum,opt)=>sum+opt.amount,0);

  // Plaatsing (screens: 100 per aantal + 100 voor nova types, 50 voor solar)

  const plaatsingPerStuk = 100 + novaExtra;
  const plaatsingTotaal = plaatsingPerStuk * aantal + bereikPrice;

  const korting = parseFloat($('s-korting').value) || 0;
  const bedTotal = bed1Price + bed2Price;

  const marge = parseFloat($('s-marge').value)/100 || 0.5;
  const aankoop = productSubtotal * (1-marge);
  const verkoop = aankoop / (1-0.2);
  const uwVerkoop = verkoop - korting + plaatsingTotaal + bedTotal;

  const item = {

function calcKnikarm(){
  const errors=[]; const warnings=[];
  const type = $('k-type').value;
  const aantal = parseInt($('k-aantal').value)||1;
  const breedte = parseFloat($('k-breedte').value);
  const uitval = parseFloat($('k-uitval').value);

  const typeData = DATA.knikarm[type];
  if(!breedte || !uitval){
    return showResult({product:'Knikarmscherm',errors:['Vul breedte en uitval in'],warnings:[],base:0,total:0});
  }

  if(breedte > typeData.max_width) errors.push(`Breedte ${breedte}mm overschrijdt maximum voor ${type} (${typeData.max_width}mm)`);
  if(uitval > typeData.max_uitval) errors.push(`Uitval ${uitval}mm overschrijdt maximum voor ${type} (${typeData.max_uitval}mm - niet produceerbaar)`);

  const bCeil = ceil(breedte, 250);
  const uCeil = ceil(uitval, 500);

  const uitvalKey = `${typeData.prefix_U}${uCeil}`;
  const breedteKey = `${typeData.prefix_B}${bCeil}`;

  let basePrice = typeData.prices?.[uitvalKey]?.[breedteKey];
  if(basePrice === 'x' || basePrice === undefined || basePrice === null){
    if(errors.length===0) errors.push(`Combinatie breedte ${bCeil}mm × uitval ${uCeil}mm niet produceerbaar voor ${type}`);
    basePrice = 0;
  }

  // Armen count
  const armen = typeData.armen?.[breedteKey];
  if(armen === 'x') warnings.push(`Armen niet beschikbaar voor deze breedte`);

  // Verdieping
  const verd = $('k-verdieping').value;
  const vData = DATA.opties.knikarm_extras.verdieping[verd];
  const verdPrice = vData && typeof vData.prijs === 'number' ? vData.prijs : 0;
  if(vData && typeof vData.prijs === 'string') warnings.push(`Verdieping: ${vData.prijs}`);

  const bereik = $('k-bereik').value;
  const bereikRaw = DATA.opties.knikarm_extras.bereikbaarheid[bereik];
  const bereikPrice = (typeof bereikRaw === 'number') ? bereikRaw : 0;
  if(typeof bereikRaw === 'string' && bereikRaw) warnings.push(`Bereikbaarheid: ${bereikRaw}`);

  const gevel = $('k-gevel').value;
  const gevelRaw = DATA.opties.knikarm_extras.type_gevel[gevel];
  const gevelPrice = (typeof gevelRaw === 'number') ? gevelRaw : 0;
  if(typeof gevelRaw === 'string' && gevelRaw) warnings.push(`Gevel: ${gevelRaw}`);

  const muur = $('k-muur').value;
  const muurPrice = muur ? (DATA.opties.knikarm_extras.muursteun[muur] || 0) : 0;

  const doek = $('k-doek').value;
  const doekPrice = doek ? (DATA.opties.knikarm_extras.doek[doek] || 0) : 0;

  const led = $('k-led').value;
  const ledPrice = led ? (DATA.opties.knikarm_extras.verlichting[led] || 0) : 0;

  const bed1 = $('k-bed1').value;
  const bed2 = $('k-bed2').value;
  const bed1Price = bed1 ? (DATA.opties.algemene.bediening[bed1] || 0) : 0;
  const bed2Price = bed2 ? (DATA.opties.algemene.bediening[bed2] || 0) : 0;
  const manualOptions = getCustomOptionRows('k');
  const manualOptionsPrice = manualOptions.reduce((sum,opt)=>sum+opt.amount,0);

  // Plaatsing: (breedte_ceil/1000)*100 + 250 (per stuk)
  const plaatsingPerStuk = (bCeil/1000)*100 + 250;
  const plaatsingTotaal = plaatsingPerStuk * aantal + verdPrice + bereikPrice + gevelPrice;

  const productSubtotal = (basePrice + muurPrice + doekPrice + ledPrice) * aantal + manualOptionsPrice;
  const korting = parseFloat($('k-korting').value) || 0;
  const bedTotal = bed1Price + bed2Price;

  const marge = parseFloat($('k-marge').value)/100 || 0.5;
  const aankoop = productSubtotal * (1-marge);
  const verkoop = aankoop / (1-0.2);
  const uwVerkoop = verkoop - korting + plaatsingTotaal + bedTotal;

  const item = {
    product:'Knikarmscherm',
    type,aantal,breedte,uitval,
    bestelmaat:`${bCeil}×${uCeil}`,
    armen:(typeof armen==='number'?armen:'-'),
    options:[
      verd && `Verdieping: ${verd}`,
      bereik && `Bereikbaarheid: ${bereik}`,
      gevel && `Gevel: ${gevel}`,
      muur && `Muursteun: ${muur}`,
      doek && `Doek: ${doek}`,
      led && `LED: ${led}`,
      bed1 && `Bediening 1: ${bed1}`,
      bed2 && `Bediening 2: ${bed2}`,
      ...manualOptions.map(opt=>`${opt.description}: €${fmt(opt.amount)}`)
    ].filter(Boolean),
    opmerkingen: $('k-opm').value,
    basePrice,muurPrice,doekPrice,ledPrice,
    extrasPrice:manualOptionsPrice,
    productSubtotal,bereikPrice,verdPrice,gevelPrice,bed1Price,bed2Price,plaatsingPerStuk,plaatsingTotaal,
    korting,marge,aankoop,verkoop,uwVerkoop,
    errors,warnings
  };
  state.currentItem = item;
  showResult(item);
}

function calcVeranda(){
  const errors=[]; const warnings=[];
  const type = $('v-type').value;
  const aantal = parseInt($('v-aantal').value)||1;
  const breedte = parseFloat($('v-breedte').value);
  const uitval = parseFloat($('v-uitval').value);

  const typeData = DATA.veranda.types[type];
  const meta = DATA.veranda.meta[type];

  // Meta info
  if(meta){
    $('v-meta').innerHTML = `<div class="info-box">Max: breedte ${meta.max_width}mm · uitval ${meta.max_uitval}mm · kast hoogte ${meta.kast_hoogte}mm · LED: ${meta.led}</div>`;
  }

  if(!breedte || !uitval){
    return showResult({product:'Veranda',errors:['Vul breedte en uitval in'],warnings:[],base:0,total:0});
  }

  if(meta){
    if(breedte > meta.max_width) errors.push(`Breedte ${breedte}mm overschrijdt maximum voor ${type} (${meta.max_width}mm)`);
    if(uitval > meta.max_uitval) errors.push(`Uitval ${uitval}mm overschrijdt maximum voor ${type} (${meta.max_uitval}mm)`);
  }

  // Bestelmaat afgerond 250mm
  const bCeil = ceil(breedte, 250);
  const uCeil = ceil(uitval, 250);

  const uitvalKey = `${typeData.prefix_U}${uCeil}`;
  const breedteKey = `${typeData.prefix_B}${bCeil}`;
  let basePrice = typeData.prices?.[uitvalKey]?.[breedteKey];
  if(basePrice === 'x' || basePrice === undefined || basePrice === null){
    if(errors.length===0) errors.push(`Combinatie breedte ${bCeil}mm × uitval ${uCeil}mm niet produceerbaar voor ${type}`);
    basePrice = 0;
  }

  // Small width surcharge (bij breedte < 1400mm op vinci 150 = +245)
  let smallSurcharge = 0;
  if(type === 'Vinci 150 onderliggend' && breedte < 1400){
    smallSurcharge = 245;
  }

  // LED
  const led = $('v-led').value;
  let ledPrice = 0;
  if(led){
    if(type === 'Vinci 250+ volant'){
      ledPrice = DATA.veranda.accessory_prices?.[type]?.[led]?.[String(bCeil)] || 0;
      if(!ledPrice) warnings.push(`Geen tabelprijs gevonden voor "${led}" bij breedte ${bCeil}mm`);
    } else {
      errors.push(`LED verlichting/volant niet mogelijk op ${type}`);
    }
  }

  // Options
  const mkabel = $('v-mkabel').value;
  const mkabelRaw = mkabel ? DATA.opties.algemene.motorkabel[mkabel] : 0;
  const mkabelPrice = (typeof mkabelRaw==='number') ? mkabelRaw : 0;

  const gevel = $('v-gevel').value;
  const gevelRaw = DATA.opties.algemene.type_gevel[gevel];
  const gevelPrice = (typeof gevelRaw === 'number') ? gevelRaw : 0;
  if(typeof gevelRaw === 'string' && gevelRaw) warnings.push(`Gevel: ${gevelRaw}`);

  const doek = $('v-doek').value;
  const doekRaw = DATA.opties.algemene.doekgroep[doek];
  // For veranda: doek groep per m² - (breedte*uitval/1000000)*value
  let doekPrice = 0;
  if(typeof doekRaw === 'number'){
    const m2 = breedte * uitval / 1000000;
    doekPrice = doekRaw * m2;
  }

  const bereik = $('v-bereik').value;
  const bereikRaw = DATA.opties.algemene.bereikbaarheid[bereik];
  const bereikPrice = (typeof bereikRaw === 'number') ? bereikRaw : 0;

  const bed1 = $('v-bed1').value;
  const bed2 = $('v-bed2').value;
  const bed1Price = bed1 ? (DATA.opties.algemene.bediening[bed1] || 0) : 0;
  const bed2Price = bed2 ? (DATA.opties.algemene.bediening[bed2] || 0) : 0;
  const manualOptions = getCustomOptionRows('v');
  const manualOptionsPrice = manualOptions.reduce((sum,opt)=>sum+opt.amount,0);

  // Extras
  let extrasPrice = 0;
  const extrasList = [];
  for(let i=1;i<=verandaExtraCount;i++){
    const selEl = $(`v-extra-${i}`);
    if(!selEl)continue;
    const name = selEl.value;
    const qty = parseInt($(`v-extra-qty-${i}`)?.value)||0;
    if(name && qty>0){
      const p = DATA.veranda.options[name].prijs;
      extrasPrice += p*qty;
      extrasList.push(`${name} (${qty}×€${p})`);
    }
  }

  // Plaatsing: 350 flat rate (from excel G10: 350 when F10>0)
  const plaatsingPerStuk = 350;
  const plaatsingTotaal = plaatsingPerStuk * aantal + bereikPrice + gevelPrice;

  const productSubtotal = (basePrice + smallSurcharge + mkabelPrice + doekPrice + ledPrice) * aantal + extrasPrice + manualOptionsPrice;
  const korting = parseFloat($('v-korting').value) || 0;
  const bedTotal = bed1Price + bed2Price;

  const marge = parseFloat($('v-marge').value)/100 || 0.4;
  const aankoop = productSubtotal * (1-marge);
  const verkoop = aankoop / (1-0.2);
  const uwVerkoop = verkoop - korting + plaatsingTotaal + bedTotal;

  const item = {
    product:'Veranda',
    type,aantal,breedte,uitval,
    bestelmaat:`${bCeil}×${uCeil}`,
    options:[
      smallSurcharge>0 && `Kleine breedte toeslag +€${smallSurcharge}`,
      mkabel && `Afw. motorkabel: ${mkabel}`,
      gevel && `Gevel: ${gevel}`,
      doek && `Doek: ${doek}`,
      bereik && `Bereikbaarheid: ${bereik}`,
      led && `${led}`,
      ...extrasList,
      bed1 && `Bediening 1: ${bed1}`,
      bed2 && `Bediening 2: ${bed2}`,
      ...manualOptions.map(opt=>`${opt.description}: €${fmt(opt.amount)}`)
    ].filter(Boolean),
    opmerkingen: $('v-opm').value,
    basePrice,smallSurcharge,mkabelPrice,doekPrice,ledPrice,extrasPrice:extrasPrice + manualOptionsPrice,
    productSubtotal,bereikPrice,gevelPrice,bed1Price,bed2Price,plaatsingPerStuk,plaatsingTotaal,
    korting,marge,aankoop,verkoop,uwVerkoop,
    errors,warnings
  };
  state.currentItem = item;
  showResult(item);
}

  html += `<div class="price-line" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:6px"><span>Subtotaal product</span><span>€${fmt(item.productSubtotal)}</span></div>`;
  html += `<div class="price-line"><span>Aankoop (×${Math.round((1-item.marge)*100)}%)</span><span>€${fmt(item.aankoop)}</span></div>`;
  html += `<div class="price-line"><span>Marge % op verkoop</span><span>${Math.round(item.marge*100)}%</span></div>`;
  if(item.korting>0) html += `<div class="price-line"><span>Korting</span><span>-€${fmt(item.korting)}</span></div>`;
  html += `<div class="price-line" style="color:#64748b"><span>Plaatsing per stuk</span><span>€${fmt(item.plaatsingPerStuk)}</span></div>`;
  if(item.bereikPrice>0) html += `<div class="price-line"><span>Bereikbaarheid</span><span>€${fmt(item.bereikPrice)}</span></div>`;
  if(item.verdPrice>0) html += `<div class="price-line"><span>Verdieping</span><span>€${fmt(item.verdPrice)}</span></div>`;
  if(item.gevelPrice>0) html += `<div class="price-line"><span>Gevel</span><span>€${fmt(item.gevelPrice)}</span></div>`;
  html += `<div class="price-line"><span>Plaatsing totaal</span><span>€${fmt(item.plaatsingTotaal)}</span></div>`;
  if(item.bed1Price>0) html += `<div class="price-line"><span>Bediening 1</span><span>€${fmt(item.bed1Price)}</span></div>`;
  if(item.bed2Price>0) html += `<div class="price-line"><span>Bediening 2</span><span>€${fmt(item.bed2Price)}</span></div>`;
  html += `<div class="price-total"><span>Uw verkoop incl. plaatsing</span><span>€${fmt(item.uwVerkoop)}</span></div>`;
  html += `</details>`;

  box.innerHTML = html;
}

// ======= Offer management =======
function addRolluikToOffer(){addItemToOffer();}
function addScreenToOffer(){addItemToOffer();}
function addKnikarmToOffer(){addItemToOffer();}
function addVerandaToOffer(){addItemToOffer();}

function addItemToOffer(){
  if(!state.currentItem){return;}
  if(state.currentItem.errors?.length){
    alert('Corrigeer de fouten voordat je dit item toevoegt.');
    return;
  }
  state.offer.push({...state.currentItem});
  renderOffer();
  alert('Toegevoegd aan offerte!');
}

function renderOffer(){
  const list = $('offer-list');
  if(state.offer.length === 0){
    list.innerHTML = '<div style="color:#94a3b8;font-size:13px;padding:20px;text-align:center">Nog geen items op offerte</div>';
    $('totals-block').innerHTML = '';
    return;
  }
  let html = '';
  state.offer.forEach((item, idx)=>{
    html += `<div class="offer-item">
      <div class="info">
        <div class="title">${item.product}: ${item.type} ${item.aantal>1?`(×${item.aantal})`:''}</div>
        <div class="desc">${item.bestelmaat||''}mm${item.options?.length? ' · '+item.options.slice(0,2).join(' · '):''}</div>
      </div>
      <div class="price">€${fmt(item.uwVerkoop)}</div>
      <button class="secondary" style="padding:4px 10px" onclick="removeOfferItem(${idx})">×</button>
    </div>`;
  });
  list.innerHTML = html;

  // Totals
  const subtotal = state.offer.reduce((s,i)=>s+i.uwVerkoop, 0);
  const aankoop = state.offer.reduce((s,i)=>s+i.aankoop, 0);
  const plaatsing = state.offer.reduce((s,i)=>s+i.plaatsingTotaal, 0);

  // Werkuren
  const tarief = parseFloat($('w-tarief')?.value) || 230;
  const uren = parseFloat($('w-uren')?.value) || 0;
  const personen = parseInt($('w-personen')?.value) || 2;
  const werkurenKost = tarief * uren * personen;

  if($('werkuren-block') && uren > 0){
    $('werkuren-block').innerHTML = `<div class="price-line"><span>${personen} persoon/personen × ${uren}u × €${fmt(tarief,0)}/u</span><span>€${fmt(werkurenKost)}</span></div>`;
  } else if($('werkuren-block')){
    $('werkuren-block').innerHTML = '';
  }

  const subtotalInclWerkuren = subtotal + werkurenKost;
  const btw = subtotalInclWerkuren * 0.06;
  const total = subtotalInclWerkuren + btw;
  const marge = subtotal - aankoop - plaatsing;
  const margePct = subtotal>0 ? (marge/subtotal*100) : 0;

  $('totals-block').innerHTML = `
    <div class="price-line"><span>Producten (excl. BTW)</span><span>€${fmt(subtotal)}</span></div>
    ${werkurenKost>0?`<div class="price-line"><span>Werkuren plaatsing</span><span>€${fmt(werkurenKost)}</span></div>`:''}
    <div class="price-line" style="font-weight:600"><span>Subtotaal (excl. BTW)</span><span>€${fmt(subtotalInclWerkuren)}</span></div>
    <div class="price-line"><span>BTW 6%</span><span>€${fmt(btw)}</span></div>
    <div class="price-total"><span>Totaal incl. BTW</span><span>€${fmt(total)}</span></div>
    <div class="price-line" style="color:#059669;margin-top:8px"><span>Bruto marge producten (incl. plaatsing)</span><span>€${fmt(marge)} (${margePct.toFixed(1)}%)</span></div>
  `;
}

function removeOfferItem(idx){
  if(confirm('Item verwijderen uit offerte?')){
    state.offer.splice(idx,1);
    renderOffer();
  }
}

function clearOffer(){
  if(state.offer.length===0)return;
  if(confirm('Weet je zeker dat je de volledige offerte wilt wissen?')){
    state.offer = [];
    renderOffer();
  }
}

// ======= Teamleader API Integration =======
const TL_BASE = 'https://api.focus.teamleader.eu';
const TL_AUTH_URL = 'https://focus.teamleader.eu/oauth2/authorize';
const TL_TOKEN_URL = 'https://offertetool.bkfixtemse.workers.dev/';

function tlGetRedirectUri(){
  return window.location.href.split('?')[0].split('#')[0];
}

function tlIsConnected(){
  return !!localStorage.getItem('tl_access_token');
}

async function tlCall(endpoint, body={}){
  let token = localStorage.getItem('tl_access_token');
  if(!token) throw new Error('Niet verbonden met Teamleader');
  const expiry = parseInt(localStorage.getItem('tl_token_expiry')||'0');
  if(expiry && Date.now() > expiry - 60000){
    await tlRefreshToken();
    token = localStorage.getItem('tl_access_token');
  }
  const res = await fetch(`${TL_BASE}/${endpoint}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(res.status===401){
    try{ await tlRefreshToken(); return tlCall(endpoint,body); }
    catch(e){ tlDisconnect(); throw new Error('Sessie verlopen. Maak opnieuw verbinding.'); }
  }
  const data = await res.json();
  if(!res.ok){
    const msg = data.errors?.[0]?.title || data.errors?.[0]?.detail || JSON.stringify(data);
    throw new Error(`API fout (${res.status}): ${msg}`);
  }
  return data;
}

async function tlRefreshToken(){
  const refresh      = localStorage.getItem('tl_refresh_token');
  const clientId     = localStorage.getItem('tl_client_id');
  const clientSecret = localStorage.getItem('tl_client_secret');
  if(!refresh||!clientId) throw new Error('Geen refresh token');
  const res = await fetch(TL_TOKEN_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({grant_type:'refresh_token',refresh_token:refresh,client_id:clientId,client_secret:clientSecret||''})
  });
  const data = await res.json();
  if(!res.ok) throw new Error('Token refresh mislukt');
  localStorage.setItem('tl_access_token', data.access_token);
  if(data.refresh_token) localStorage.setItem('tl_refresh_token', data.refresh_token);
  if(data.expires_in) localStorage.setItem('tl_token_expiry', String(Date.now()+data.expires_in*1000));
}

async function tlStartAuth(){
  const clientId = $('tl-client-id')?.value.trim();
  const clientSecret = $('tl-client-secret')?.value.trim();
  if(!clientId||!clientSecret){ alert('Vul zowel Client ID als Client Secret in'); return; }
  localStorage.setItem('tl_client_id', clientId);
  localStorage.setItem('tl_client_secret', clientSecret);
  localStorage.setItem('tl_saved_offer', JSON.stringify(state.offer));
  const redirectUri = tlGetRedirectUri();
  const authUrl = `${TL_AUTH_URL}?${new URLSearchParams({client_id:clientId,response_type:'code',redirect_uri:redirectUri})}`;
  window.location.href = authUrl;
}

async function tlExchangeCode(code){
  const clientId     = localStorage.getItem('tl_client_id');
  const clientSecret = localStorage.getItem('tl_client_secret');
  try{
    const res = await fetch(TL_TOKEN_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        grant_type:'authorization_code', code,
        redirect_uri:tlGetRedirectUri(),
        client_id:clientId, client_secret:clientSecret
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error_description||data.error||'Token exchange mislukt');
    localStorage.setItem('tl_access_token', data.access_token);
    if(data.refresh_token) localStorage.setItem('tl_refresh_token', data.refresh_token);
    if(data.expires_in) localStorage.setItem('tl_token_expiry', String(Date.now()+data.expires_in*1000));
    const saved = localStorage.getItem('tl_saved_offer');
    if(saved){ try{ state.offer=JSON.parse(saved); localStorage.removeItem('tl_saved_offer'); renderOffer(); }catch(e){} }
    await tlOnConnected();
  }catch(err){
    alert(`Verbinding mislukt: ${err.message}`);
    $('tl-manual-token-section').classList.remove('hidden');
  }
}

async function tlHandleCallback(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(!code) return;
  window.history.replaceState({}, document.title, window.location.pathname);
  await tlExchangeCode(code);
}

async function tlSaveManualToken(){
  const raw = $('tl-callback-url')?.value.trim();
  if(!raw){ alert('Plak de volledige callback URL in'); return; }
  let code = null;
  try{
    const search = raw.includes('?') ? raw.split('?')[1] : raw;
    code = new URLSearchParams(search).get('code');
  }catch(e){}
  if(!code){ alert('Geen code gevonden in de URL.\nZorg dat je de volledige adresbalk-URL kopieert.'); return; }
  await tlExchangeCode(code);
}

async function tlOnConnected(){
  tlUpdateUI();
  await tlFetchTaxRates();
}

function tlDisconnect(){
  ['tl_access_token','tl_refresh_token','tl_token_expiry'].forEach(k=>localStorage.removeItem(k));
  state.tlSelectedDeal = null;
  tlUpdateUI();
}

function tlUpdateUI(){
  const connected = tlIsConnected();
  const cfg = $('tl-config');
  const conn = $('tl-connected');
  const status = $('tl-status');
  if(!cfg||!conn) return;
  if(connected){
    cfg.classList.add('hidden');
    conn.classList.remove('hidden');
    status.innerHTML = '<span class="tag success" style="font-size:12px">● Verbonden met Teamleader</span>';
  } else {
    cfg.classList.remove('hidden');
    conn.classList.add('hidden');
    status.innerHTML = '';
    const hint = $('tl-redirect-hint');
    if(hint) hint.textContent = tlGetRedirectUri();
  }
}

async function tlFetchTaxRates(){
  try{
    const data = await tlCall('taxRates.list',{page:{size:50,number:1}});
    const rates = data.data||[];
    const sel = $('tl-tax-rate');
    if(!sel) return;
    sel.innerHTML = '<option value="">— kies BTW tarief —</option>';
    rates.forEach(r=>{
      const o = document.createElement('option');
      o.value = r.id;
      o.textContent = r.description || `${(r.rate*100).toFixed(0)}%`;
      sel.appendChild(o);
    });
    const saved = localStorage.getItem('tl_tax_rate_id');
    if(saved) sel.value = saved;
    sel.onchange = ()=>localStorage.setItem('tl_tax_rate_id', sel.value);
  }catch(e){ console.warn('Tax rates fetch failed:', e.message); }
}

let tlSearchTimer = null;
function tlOnDealSearchInput(){
  clearTimeout(tlSearchTimer);
  const term = $('tl-deal-search').value.trim();
  const dd = $('tl-deal-dropdown');
  if(term.length < 2){ dd.classList.add('hidden'); dd.innerHTML=''; return; }
  tlSearchTimer = setTimeout(()=>tlSearchDeals(term), 320);
}

async function tlSearchDeals(term){
  const dd = $('tl-deal-dropdown');
  dd.innerHTML = '<div class="tl-deal-option" style="color:#94a3b8">Zoeken…</div>';
  dd.classList.remove('hidden');
  try{
    const data = await tlCall('deals.list',{filter:{term},page:{size:10,number:1}});
    const deals = data.data||[];
    if(!deals.length){
      dd.innerHTML='<div class="tl-deal-option" style="color:#94a3b8">Geen deals gevonden</div>';
      return;
    }
    dd.innerHTML = deals.map(d=>`
      <div class="tl-deal-option" onclick='tlSelectDeal(${JSON.stringify(d).replace(/'/g,"&#39;")})'>
        <strong>${d.title||'—'}</strong>
        ${d.reference?`<span style="color:#94a3b8;margin-left:6px;font-size:11px">#${d.reference}</span>`:''}
        <span class="tag" style="float:right;margin-top:1px">${d.status||''}</span>
      </div>`).join('');
  }catch(e){
    dd.innerHTML=`<div class="tl-deal-option" style="color:#dc2626">${e.message}</div>`;
  }
}

function tlSelectDeal(deal){
  state.tlSelectedDeal = deal;
  $('tl-deal-search').value = deal.title + (deal.reference?` (#${deal.reference})`:'');
  const dd = $('tl-deal-dropdown');
  dd.classList.add('hidden'); dd.innerHTML='';
  $('tl-selected-deal-info').textContent = `✓ Deal geselecteerd: ${deal.title}`;
}

async function tlExportQuotation(e){
  if(!state.offer.length){ alert('Voeg eerst items toe aan de offerte'); return; }
  if(!state.tlSelectedDeal){ alert('Selecteer eerst een deal via het zoekveld'); return; }
  const taxRateId = $('tl-tax-rate')?.value;
  if(!taxRateId){ alert('Selecteer een BTW tarief'); return; }

  const tarief = parseFloat($('w-tarief')?.value)||230;
  const uren   = parseFloat($('w-uren')?.value)||0;
  const personen = parseInt($('w-personen')?.value)||2;

  const lineItems = state.offer.map(item=>({
    quantity: item.aantal,
    description: `${item.product} - ${item.type}`,
    extended_description: [
      item.bestelmaat ? `Bestelmaat: ${item.bestelmaat}mm` : '',
      ...(item.options||[]),
      item.opmerkingen||''
    ].filter(Boolean).join('\n'),
    unit_price:{ amount: parseFloat((item.uwVerkoop/item.aantal).toFixed(2)), tax:'excluding' },
    tax_rate_id: taxRateId
  }));

  if(uren>0){
    lineItems.push({
      quantity: uren*personen,
      description:`Werkuren plaatsing (${personen} persoon/personen @ €${tarief}/u)`,
      extended_description:`${personen} monteur(s) × ${uren} uren`,
      unit_price:{ amount: parseFloat(tarief.toFixed(2)), tax:'excluding' },
      tax_rate_id: taxRateId
    });
  }

  const payload = {
    deal_id: state.tlSelectedDeal.id,
    grouped_lines:[{ line_items: lineItems }]
  };

  const btn = $('tl-export-btn');
  btn.disabled=true; btn.textContent='Exporteren…';
  try{
    const result = await tlCall('quotations.create', payload);
    const qid = result.data?.id||'';
    btn.textContent='✓ Geëxporteerd!';
    btn.style.background='#059669';
    setTimeout(()=>{ btn.textContent='⬆ Exporteer naar Teamleader'; btn.style.background=''; btn.disabled=false; },3500);
    alert(`Offerte aangemaakt in Teamleader!\nDeal: ${state.tlSelectedDeal.title}${qid?'\nOfferte ID: '+qid:''}`);
  }catch(err){
    btn.textContent='⬆ Exporteer naar Teamleader'; btn.disabled=false;
    alert(`Export mislukt:\n${err.message}`);
  }
}

async function tlInit(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('code')){
    await tlHandleCallback();
  } else {
    tlUpdateUI();
    if(tlIsConnected()) await tlFetchTaxRates();
  }
  document.addEventListener('click', e=>{
    const dd = $('tl-deal-dropdown');
    if(dd && !dd.contains(e.target) && e.target.id!=='tl-deal-search') dd.classList.add('hidden');
  });
}
